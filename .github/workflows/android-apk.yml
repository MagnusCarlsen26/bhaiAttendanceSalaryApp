name: Android APK

on:
  push:
    branches:
      - main
      - stage
  workflow_dispatch:

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Check Expo token
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN is not configured."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Expo configuration
        run: npm run expo:doctor

      - name: Select build profile
        id: target
        run: |
          branch="${GITHUB_REF_NAME}"
          if [ "$branch" = "main" ]; then
            echo "profile=production-apk" >> "$GITHUB_OUTPUT"
            echo "artifact_name=attendanceSalaryApp-production-apk" >> "$GITHUB_OUTPUT"
          elif [ "$branch" = "stage" ]; then
            echo "profile=preview-apk" >> "$GITHUB_OUTPUT"
            echo "artifact_name=attendanceSalaryApp-preview-apk" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported branch: $branch"
            exit 1
          fi

      - name: Build Android APK
        run: |
          npx eas-cli@latest build \
            --platform android \
            --profile "${{ steps.target.outputs.profile }}" \
            --non-interactive \
            --wait \
            --json > eas-build.json

      - name: Extract build metadata
        id: meta
        run: node scripts/extract-eas-build-info.js eas-build.json

      - name: Add build summary
        run: |
          echo "## Android APK build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: $GITHUB_REF_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "- Profile: ${{ steps.target.outputs.profile }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.meta.outputs.build_details_url }}" ]; then
            echo "- EAS build: ${{ steps.meta.outputs.build_details_url }}" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "${{ steps.meta.outputs.apk_url }}" ]; then
            echo "- APK URL: ${{ steps.meta.outputs.apk_url }}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Download APK artifact
        if: ${{ steps.meta.outputs.apk_url != '' }}
        run: curl -L "${{ steps.meta.outputs.apk_url }}" -o app-release.apk

      - name: Upload APK artifact
        if: ${{ steps.meta.outputs.apk_url != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.target.outputs.artifact_name }}
          path: app-release.apk
          retention-days: 14
